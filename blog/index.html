---
layout: default
title: Blog
---

<h1>Блог</h1>

{% for post in paginator.posts %}
<article>
    <h2>
        <a href="{{ post.url }}">
            {{ post.title }}
        </a>
    </h2>

    <p>{{ post.excerpt }}</p>
</article>
{% endfor %}

<div class="pagination">
    {% if paginator.previous_page %}
        <a href="{{ paginator.previous_page_path }}">
            Назад
        </a>
    {% endif %}

    {% if paginator.next_page %}
        <a href="{{ paginator.next_page_path }}">
            Вперёд
        </a>
    {% endif %}
</div>
