title: Aramayis Mirzoyan
description: Full-Stack Developer
url: "https://aramayismirzoyan.com"
plugins:
  - jekyll-paginate

paginate: 5
paginate_path: "/blog/page/:num/"

permalink: /blog/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

jekyll-archives:
  enabled:
    - categories
  layout: category
  permalinks:
    category: /category/:name/